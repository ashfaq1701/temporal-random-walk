name: Build CI Image

on:
  push:
    branches: [master]
    paths:
      - ci/Dockerfile
      - requirements.txt

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build -f ci/Dockerfile -t ghcr.io/${{ github.repository }}/ci:latest .

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository }}/ci:latest

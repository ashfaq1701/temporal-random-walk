name: CPU Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  merge_group:
  workflow_dispatch:

jobs:
  cpu-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull prebuilt CI image
        run: docker pull ghcr.io/${{ github.repository }}/ci:latest

      - name: Run C++ and pytest suites in CPU container
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/project" \
            -w /project \
            ghcr.io/${{ github.repository }}/ci:latest
